<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API BDD Accès Campus - Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
    <script>
        const spec = {
          "openapi": "3.0.0",
          "info": {
            "title": "API BDD Acces Campus",
            "description": "Documentation de l'API du backend Acces Campus. Cette API expose les routes utilisees par le PGS (Poste de Gestion de Salle), PSW (Poste Serveur Web), BAE (Borne d'Appel Etudiant) et PEA (Poignee Electrique Autonome).",
            "contact": {
              "email": "emile.guillerm@saintaubinlasalle.fr"
            },
            "version": "2.0.0"
          },
          "servers": [
            {
              "url": "http://localhost",
              "description": "Serveur de developpement local"
            }
          ],
          "tags": [
            {
              "name": "BAE",
              "description": "Borne d'Appel Etudiant"
            },
            {
              "name": "PEA",
              "description": "Poignee Electrique Autonome"
            },
            {
              "name": "PGS",
              "description": "Poste Gestion Salle"
            },
            {
              "name": "PSW",
              "description": "Poste Serveur Web"
            }
          ],
          "paths": {
            "/bae/etat_salle": {
              "get": {
                "tags": [
                  "BAE"
                ],
                "summary": "Etat actuel de la salle a partir de l'adresse MAC du BAE",
                "description": "Recupere les informations du cours en cours dans la salle correspondant a l'adresse MAC du BAE (classe, duree depuis le debut, professeur, nombre de presents, nombre d'absents, liste des presents, liste des absents).",
                "parameters": [
                  {
                    "in": "query",
                    "name": "MAC",
                    "required": true,
                    "description": "Adresse MAC du BAE",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des informations du cours en cours.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/EtatSalle"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (salle introuvable, pas de cours, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "salleIntrouvable": {
                            "value": "Salle introuvable"
                          },
                          "pasDeCours": {
                            "value": "Pas de cours"
                          },
                          "erreur": {
                            "value": "Erreur"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/bae/scanner_badge": {
              "post": {
                "tags": [
                  "BAE"
                ],
                "summary": "Scanne d'un badge sur le BAE",
                "description": "Enregistre le scanne d'un badge (uuid) sur le BAE identifie par son adresse MAC. Met a jour la presence et eventuellement enregistre un retard si le badge est scanne apres le debut du cours (marge de 5min).",
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/ScannerBadgeBAE"
                      }
                    }
                  }
                },
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des informations de l'eleve scanne.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/EleveScanne"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (utilisateur introuvable, salle introuvable, pas de cours, badge deja scanne, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "utilisateurIntrouvable": {
                            "value": "Utilisateur introuvable"
                          },
                          "salleIntrouvable": {
                            "value": "Salle introuvable"
                          },
                          "pasAcces": {
                            "value": "L'utilisateur n'as pas acces"
                          },
                          "pasDeCoursActuellement": {
                            "value": "Pas de cours dans cette salle actuellement"
                          },
                          "badgeDejaScanne": {
                            "value": "badge deja scanne"
                          },
                          "erreurEnregistrementRetard": {
                            "value": "Erreur lors de l'enregistrement du retard"
                          },
                          "erreurEnregistrementPresence": {
                            "value": "Erreur lors de l'enregistrement de la presence"
                          },
                          "erreurSuppressionAbsence": {
                            "value": "Erreur lors de la suppression de l'absence"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/pea/verif_badge": {
              "get": {
                "tags": [
                  "PEA"
                ],
                "summary": "Verifier l'autorisation d'un badge sur une PEA",
                "description": "Verifie si un badge est autorise a ouvrir la salle correspondant a l'adresse MAC de la PEA. Un admin ou un professeur a acces a toutes les salles. Un eleve doit avoir deja eu cours dans cette salle.",
                "parameters": [
                  {
                    "in": "query",
                    "name": "MAC",
                    "required": true,
                    "description": "Adresse MAC de la PEA",
                    "schema": {
                      "type": "string"
                    }
                  },
                  {
                    "in": "query",
                    "name": "badgeid",
                    "required": true,
                    "description": "Identifiant unique (uuid) du badge",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des informations utilisateur et autorisation.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/VerifBadgePEA"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (utilisateur introuvable, salle introuvable, pas d'acces).",
                    "content": {
                      "application/json": {
                        "examples": {
                          "utilisateurIntrouvable": {
                            "value": "Utilisateur introuvable"
                          },
                          "salleIntrouvable": {
                            "value": "Salle introuvable"
                          },
                          "pasAcces": {
                            "value": "L'utilisateur n'as pas acces"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/pgs/planning": {
              "get": {
                "tags": [
                  "PGS"
                ],
                "summary": "Planning d'une salle entre deux timestamps",
                "description": "Retourne la liste des cours d'une salle dont l'heure de debut et l'heure de fin sont comprises dans l'intervalle [debut, fin].",
                "parameters": [
                  {
                    "in": "query",
                    "name": "salle",
                    "required": true,
                    "description": "Numero/identifiant de la salle",
                    "schema": {
                      "type": "string"
                    }
                  },
                  {
                    "in": "query",
                    "name": "debut",
                    "required": true,
                    "description": "Timestamp UNIX (secondes) de debut de l'intervalle",
                    "schema": {
                      "type": "integer",
                      "format": "int64"
                    }
                  },
                  {
                    "in": "query",
                    "name": "fin",
                    "required": true,
                    "description": "Timestamp UNIX (secondes) de fin de l'intervalle",
                    "schema": {
                      "type": "integer",
                      "format": "int64"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Liste des cours dans l'intervalle.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "type": "array",
                          "items": {
                            "$ref": "#/components/schemas/CoursPlanning"
                          }
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "La salle n'existe pas.",
                    "content": {
                      "application/json": {
                        "example": "La salle n'existe pas"
                      }
                    }
                  }
                }
              }
            },
            "/pgs/etat_salle": {
              "get": {
                "tags": [
                  "PGS"
                ],
                "summary": "Etat actuel d'une salle a partir de son numero",
                "description": "Recupere les informations du cours en cours dans la salle (classe, duree depuis le debut, professeur, nombre de presents/absents, listes).",
                "parameters": [
                  {
                    "in": "query",
                    "name": "salle",
                    "required": true,
                    "description": "Numero/identifiant de la salle",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des informations du cours en cours.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/EtatSalle"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (pas de cours, classe ou professeur introuvable, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "pasDeCours": {
                            "value": "Pas de cours"
                          },
                          "erreur": {
                            "value": "Erreur"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/pgs/recherche_utilisateur": {
              "get": {
                "tags": [
                  "PGS"
                ],
                "summary": "Recherche d'utilisateur par nom et/ou prenom",
                "description": "Retourne deux listes (recherche_prenom et recherche_nom) d'utilisateurs correspondants. Au moins un des deux parametres (nom ou prenom) doit etre fourni.",
                "parameters": [
                  {
                    "in": "query",
                    "name": "prenom",
                    "required": false,
                    "description": "Prenom recherche",
                    "schema": {
                      "type": "string"
                    }
                  },
                  {
                    "in": "query",
                    "name": "nom",
                    "required": false,
                    "description": "Nom recherche",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des deux listes de resultats.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/RechercheUtilisateur"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee (aucun parametre fourni).",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Aucun utilisateur trouve ou erreur.",
                    "content": {
                      "application/json": {
                        "examples": {
                          "aucunUtilisateur": {
                            "value": "Aucun utilisateur trouve"
                          },
                          "erreur": {
                            "value": "Erreur"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/pgs/historique_badge": {
              "get": {
                "tags": [
                  "PGS"
                ],
                "summary": "Historique d'absence/retard d'un eleve",
                "description": "Retourne la liste des absences et retards d'un eleve identifie par son id utilisateur (champ uuid_user).",
                "parameters": [
                  {
                    "in": "query",
                    "name": "uuid_user",
                    "required": true,
                    "description": "Identifiant numerique de l'utilisateur",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour de l'historique d'absences.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/HistoriqueAbsence"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur lors de la recherche.",
                    "content": {
                      "application/json": {
                        "example": "Erreur"
                      }
                    }
                  }
                }
              }
            },
            "/pgs/reserver_salle": {
              "post": {
                "tags": [
                  "PGS"
                ],
                "summary": "Reservation d'une salle",
                "description": "Cree un cours/reservation dans une salle pour une classe, un professeur, sur un creneau [heure_debut, heure_fin]. Verifie que la salle, la classe et le professeur existent, et que le creneau est libre.",
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/ReservationPGS"
                      }
                    }
                  }
                },
                "responses": {
                  "204": {
                    "description": "Reservation enregistree avec succes."
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (salle, classe ou professeur introuvable, creneau occupe, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "champManquant": {
                            "value": "Un champ est manquant"
                          },
                          "salleIntrouvable": {
                            "value": "Salle introuvable"
                          },
                          "erreur": {
                            "value": "Erreur"
                          },
                          "creneauOccupe": {
                            "value": "Creneau occupe"
                          },
                          "classeInexistante": {
                            "value": "Classe inexistante"
                          },
                          "professeurInexistant": {
                            "value": "Professeur inexistante"
                          },
                          "erreurEnregistrementCours": {
                            "value": "Erreur enregistrement cours"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/pgs/badges/{badgeid}": {
              "get": {
                "tags": [
                  "PGS"
                ],
                "summary": "Informations d'un badge",
                "description": "Retourne les informations de l'utilisateur lie au badge identifie par son uuid (nom, prenom, classe pour un eleve, statut).",
                "parameters": [
                  {
                    "in": "path",
                    "name": "badgeid",
                    "required": true,
                    "description": "Identifiant unique (uuid) du badge",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour des informations du badge.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/InformationBadge"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Pas d'utilisateur trouve.",
                    "content": {
                      "application/json": {
                        "example": "Pas d'utilisateur trouvee"
                      }
                    }
                  }
                }
              },
              "delete": {
                "tags": [
                  "PGS"
                ],
                "summary": "Suppression d'un badge",
                "description": "Supprime le badge identifie par son uuid (le champ correspondant est mis a NULL cote utilisateur).",
                "parameters": [
                  {
                    "in": "path",
                    "name": "badgeid",
                    "required": true,
                    "description": "Identifiant unique (uuid) du badge",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "responses": {
                  "204": {
                    "description": "Suppression reussie."
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur lors de la suppression.",
                    "content": {
                      "application/json": {
                        "example": "Erreur lors de la suppression du badge"
                      }
                    }
                  }
                }
              },
              "post": {
                "tags": [
                  "PGS"
                ],
                "summary": "Creation d'un badge et liaison a un utilisateur",
                "description": "Cree un nouveau badge avec l'uuid passe en URL et le lie a l'utilisateur dont l'id est passe dans le body (uuid_user).",
                "parameters": [
                  {
                    "in": "path",
                    "name": "badgeid",
                    "required": true,
                    "description": "Identifiant unique (uuid) du nouveau badge",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/CreationBadge"
                      }
                    }
                  }
                },
                "responses": {
                  "204": {
                    "description": "Badge cree et lie a l'utilisateur."
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (badge deja present, utilisateur introuvable, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "badgeDejaPresent": {
                            "value": "Badge deja present ou erreur"
                          },
                          "utilisateurIntrouvable": {
                            "value": "Utilisateur introuvable"
                          },
                          "badgeNonCree": {
                            "value": "Le badge n'a pas pus etre cree"
                          },
                          "badgeNonLie": {
                            "value": "Le badge n'a pas pus etre lie"
                          }
                        }
                      }
                    }
                  }
                }
              },
              "put": {
                "tags": [
                  "PGS"
                ],
                "summary": "Modification des informations de l'utilisateur lie a un badge",
                "description": "Met a jour les informations de l'utilisateur associe au badge. Tous les champs sont optionnels : seuls ceux presents dans le body sont modifies.",
                "parameters": [
                  {
                    "in": "path",
                    "name": "badgeid",
                    "required": true,
                    "description": "Identifiant unique (uuid) du badge",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/ModificationBadge"
                      }
                    }
                  }
                },
                "responses": {
                  "204": {
                    "description": "Modification effectuee."
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Pas d'utilisateur trouve ou erreur de mise a jour.",
                    "content": {
                      "application/json": {
                        "examples": {
                          "pasUtilisateurTrouvee": {
                            "value": "Pas d'utilisateur trouvee"
                          },
                          "infoNonMisesAJour": {
                            "value": "Les informations n'ont pus etre mis a jour"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/psw/login": {
              "post": {
                "tags": [
                  "PSW"
                ],
                "summary": "Authentification utilisateur",
                "description": "Authentifie un utilisateur a partir d'un login et d'un mot de passe. Retourne un token JWT (signe HS256, expire dans 36000 secondes) en cas de succes.",
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/LoginPSW"
                      }
                    }
                  }
                },
                "responses": {
                  "200": {
                    "description": "Authentification reussie. Retour du token JWT.",
                    "content": {
                      "application/json": {
                        "schema": {
                          "$ref": "#/components/schemas/TokenJWT"
                        }
                      }
                    }
                  },
                  "400": {
                    "description": "Requete mal formulee. Veuillez verifier les champs.",
                    "content": {
                      "application/json": {
                        "example": "Requete mal formulee. Veuillez verifier les champs."
                      }
                    }
                  },
                  "404": {
                    "description": "Erreur (login inconnu, mot de passe incorrect, etc.)",
                    "content": {
                      "application/json": {
                        "examples": {
                          "pasDeLogin": {
                            "value": "Pas de login"
                          },
                          "pasDeMotDePasse": {
                            "value": "Pas de mot de passe"
                          },
                          "erreur": {
                            "value": "Erreur"
                          },
                          "motDePasseIncorrect": {
                            "value": "Mot de passe incorrecte"
                          }
                        }
                      }
                    }
                  }
                }
              }
            },
            "/psw/historique_eleve": {
              "get": {
                "tags": [
                  "PSW"
                ],
                "summary": "Historique d'absence/retard d'un eleve",
                "description": "Retourne la liste des absences et retards d'un eleve a partir de son id utilisateur.",
                "parameters": [
                  {
                    "in": "query",
                    "name": "utilisateur",
                    "required": true,
                    "description": "Identifiant numerique de l'utilisateur",
                    "schema": {
                      "type": "string"
                    }
                  }
                ],
                "requestBody": {
                  "required": true,
                  "description": "Champ token (non encore implemente cote backend).",
                  "content": {
                    "application/json": {
                      "schema": {
                        "$ref": "#/components/schemas/BodyTokenPSW"
                      }
                    }
                  }
                },
                "responses": {
                  "200": {
                    "description": "Operation reussie. Retour de l'historique d'absences.",
                    "content": {

                      "type": "string"
                    }
                  },
                  {
                    "in": "query",

                  {
                    "in": "query",

          "components": {
            "schemas": {
              "ScannerBadgeBAE": {

                    "type": "string",

              "EleveScanne": {
                "type": "object",
                "properties": {
                  "nom": {
                    "type": "string"

                  "prenom": {
                    "type": "string"
                  },

                    "type": "string",

                }
              },
              "EtatSalle": {

                  "classe": {
                    "type": "string",
                    "description": "Nom de la classe"

                    "type": "integer"
                  },
                  "listeAbsent": {
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/UtilisateurBref"
                    }
                  },
                  "listePresent": {
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/UtilisateurBref"
                    }
                  }
                },
                "example": {
                  "classe": "BTS-SIO-2",
                  "duree": 1320,
                  "professeur": "Martin",
                  "nb_absent": 2,
                  "nb_present": 18,
                  "listeAbsent": [

                      "nom": "Durand",
                      "prenom": "Lucie"

                    {
                      "nom": "Lefevre",
                      "prenom": "Paul"
                    }
                  ],
                  "listePresent": [
                    {
                      "nom": "Dupont",
                      "prenom": "Jean"
                    },
                    {
                      "nom": "Bernard",
                      "prenom": "Sophie"
                    }
                  ]
                }
              },
              "UtilisateurBref": {
                "type": "object",
                "properties": {
                  "nom": {
                    "type": "string"
                  },
                  "prenom": {
                    "type": "string"
                  }
                },
                "example": {
                  "nom": "Dupont",
                  "prenom": "Jean"
                }
              },
              "VerifBadgePEA": {
                "type": "object",
                "properties": {
                  "nom": {
                    "type": "string"
                  },
                  "prenom": {
                    "type": "string"
                  },

                    "type": "string",
                    "description": "Nom de classe pour un eleve, role (\"admin\" ou \"professeur\") pour les autres, \"Introuvable\" si la classe est inconnue."

                    "type": "boolean"
                  }

                  "nom": "Dupont",
                  "prenom": "Jean",
                  "classe": "BTS-SIO-2",

                    "format": "int64",

                    "type": "integer",
                    "format": "int64",
                    "description": "Timestamp UNIX (secondes)"
                  },
                  "classe": {
                    "type": "string",
                    "description": "Nom de la classe ou \"inconnue\""
                  }

                "example": {

                      "nom_utilisateur": "Dupont"

                    {
                      "id_utilisateur": 27,
                      "prenom_utilisateur": "Jean",
                      "nom_utilisateur": "Martin"
                    }
                  ],
                  "recherche_nom": [
                    {
                      "id_utilisateur": 8,
                      "prenom_utilisateur": "Sophie",
                      "nom_utilisateur": "Bernard"
                    }
                  ]
                }
              },
              "UtilisateurResultat": {
                "type": "object",
                "properties": {
                  "id_utilisateur": {
                    "type": "integer"
                  },
                  "prenom_utilisateur": {
                    "type": "string"
                  },
                  "nom_utilisateur": {
                    "type": "string"
                  }
                },

                  "id_utilisateur": 12,
                  "prenom_utilisateur": "Jean",
                  "nom_utilisateur": "Dupont"

                      "$ref": "#/components/schemas/AbsenceItem"

                    "type": "integer",

                  "heure_fin": {
                    "type": "integer",
                    "format": "int64",

                    "type": "string",

                  },

                  "professeur": "Martin",

                    "type": "string"

                    "type": "string",

                  "classe": {
                    "type": "string",
                    "description": "Present uniquement pour les eleves"

                  "nom_user": "Dupont",

                  "uuid_user": 12
                }

                  "nom": {
                    "type": "string"
                  },
                  "prenom": {
                    "type": "string"

                    "type": "string"
                  },
                  "login": {
                    "type": "string"

                  "role": {
                    "type": "string"
                  }

                  "prenom": "Jean",

                    "type": "string"
                  },
                  "motdepasse": {
                    "type": "string"
                  }

                    "type": "string"
                  }

                  "id_salle": "B204"
                }

                },
                "example": {
                  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMiIsImlzcyI6ImF1dGgwIiwiZXhwIjoxNzAwMDAwMDAwfQ.abcdef1234567890"
                }
              }
            }
          }
