                "tags": ["PSW"],
                "summary": "Reserver une salle",

                  "description": "UUID du badge scanné et salle.",
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "object",
                        "required": ["heure_debut", "heure_fin", "salle", "utilisateur"],
                        "properties": {
                          "heure_debut": { "type": "integer", "description": "Timestamp du début de la réservation", "example": 1710495000 },
                          "heure_fin": { "type": "integer", "description": "Timestamp de la fin de la réservation", "example": 1710498600 },
                          "salle": { "type": "integer", "description": "Numéro de la salle", "example": 212 },
                          "utilisateur": { "type": "integer", "description": "ID de l'utilisateur", "example": 1 }
                        }
                      }
                    }

                "responses": {
                  "204": { "description": "Opération réussie. La salle à bien été reserver" },
                  "403": {
                    "description": "Opération refusée/déclinée.",
                    "content": { "application/json": { "example": "cours deja present" } }

                "requestBody": {
                  "description": "UUID du badge scanné et salle.",

                    "application/json": {
                      "schema": {
                        "type": "object",
                        "required": ["heure_debut", "heure_fin", "salle", "classe"],
                        "properties": {
                          "heure_debut": { "type": "integer", "description": "Timestamp du début de la réservation", "example": 1710495000 },

                          "salle": { "type": "integer", "description": "Numéro de la salle", "example": 212 },

                  { "name": "badgeid", "in": "path", "required": true, "schema": { "type": "string" } }

                  "200": {
                    "description": "Opération réussie. Renvoie les informations du badge",

                      "application/json": {
                        "schema": { "$ref": "#/components/schemas/utilisateur" },
                        "example": {
                          "id_user": 1,
                          "nom_user": "Guillerm",
                          "prenom_user": "Emile",
                          "login_user": "eguillerm",

                "security": []

                  { "name": "badgeid", "in": "path", "required": true, "schema": { "type": "string" } }
                ],
                "requestBody": {
                  "description": "UUID utilisateur à associé",

                    "application/json": {
                      "schema": {
                        "type": "object",

                "responses": {
