worker_processes 1;

events {
    worker_connections 1024;
}

http {

    include       mime.types;
    default_type  application/octet-stream;

    server {
        listen      80;
        server_name localhost;

        root  "C:/Users/Mathi/OneDrive - saintaubinlasalle/Documents/Projet/Projet technique/github/Acces-Campus/PSWMathis/acces-campus";
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /psw/ {
            proxy_pass         http://[::1]:3001;
            proxy_set_header   Host $host;
        }

    }
}
